version: "1"
pipelines:
  input:
    mode: fail-fast
    onError: block
    timeoutMs: 3000
    guards:
      - type: prompt-injection
        action: block
      - type: pii-cn
        action: mask
        config:
          entities: [id-card, passport, phone]
      - type: keyword
        action: block
        config:
          denied: []
  output:
    mode: run-all
    onError: block
    guards:
      - type: pii-cn
        action: mask
        config:
          entities: [id-card, passport, phone]
      - type: profanity-cn
        action: block
      - type: word-count
        action: warn
        config:
          max: 4000
