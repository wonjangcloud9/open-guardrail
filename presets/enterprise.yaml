version: "1"
pipelines:
  input:
    mode: fail-fast
    onError: block
    timeoutMs: 3000
    guards:
      - type: prompt-injection
        action: block
      - type: jailbreak-pattern
        action: block
      - type: sql-injection
        action: block
      - type: xss-guard
        action: block
      - type: command-injection
        action: block
      - type: path-traversal
        action: block
      - type: ssrf-detect
        action: block
      - type: encoding-attack
        action: block
      - type: pii
        action: mask
        config:
          entities: [email, phone, credit-card, ssn]
      - type: consent-withdrawal
        action: warn
      - type: boundary-test
        action: block
      - type: adversarial-suffix
        action: warn
  output:
    mode: run-all
    onError: block
    guards:
      - type: pii
        action: mask
        config:
          entities: [email, phone, credit-card, ssn]
      - type: data-leakage
        action: block
      - type: api-key-detect
        action: block
      - type: secret-pattern
        action: block
      - type: pii-redact-consistency
        action: warn
      - type: data-minimization
        action: warn
      - type: chain-of-thought-leak
        action: warn
      - type: model-fingerprint
        action: warn
      - type: webhook-safety
        action: block
      - type: session-hijack
        action: block
      - type: code-safety
        action: warn
      - type: safety-classifier
        action: block
      - type: disclaimer-require
        action: warn
